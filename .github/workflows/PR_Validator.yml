name: Pull Request — SIRI XML Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.xml"

jobs:
  validate:
    uses: ./.github/workflows/INT_SIRI_Validator.yml
    with:
      mode: pr
      checkout_ref: ${{ github.event.pull_request.head.sha }}
      base_ref: ${{ github.base_ref }}
      siri_xsd_version: "v2.2"
      exclude_prefix: "siri-xsd/"
      fail_fast: false
