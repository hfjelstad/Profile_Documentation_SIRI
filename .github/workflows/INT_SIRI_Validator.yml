name: Reusable — SIRI XML Validation

on:
  workflow_call:
    inputs:
      mode:            # 'pr' or 'push'
        required: true
        type: string
      checkout_ref:    # commit/branch/tag to validate (HEAD in PR/push)
        required: true
        type: string
      base_ref:        # PR base branch (required for mode=pr)
        required: false
        type: string
      before:          # for push: before-SHA
        required: false
        type: string
      after:           # for push: after-SHA (usually github.sha)
        required: false
        type: string
      siri_xsd_version:
        required: false
        type: string
        default: "v2.2"
      exclude_prefix:  # exclude files in this folder (the schemas themselves)
        required: false
        type: string
        default: "siri-xsd/"
      fail_fast:
        required: false
        type: boolean
        default: false

jobs:
  validate-siri:
    name: "Validate SIRI XML (${{ inputs.mode }})"
    runs-on: ubuntu-latest

    steps:
      - name: Check out the code to validate
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}
          fetch-depth: 0

      - name: Clone SIRI XSD schema
        run: |
          set -euo pipefail
          if [ ! -d "siri-xsd" ]; then
            git clone --depth=1 --branch "${{ inputs.siri_xsd_version }}" \
              https://github.com/SIRI-CEN/SIRI.git siri-xsd
          fi
          echo "Schema files:"
          ls -lah siri-xsd/xsd/siri.xsd || true

      - name: Install xmllint
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils

      - name: Validate changed XML files
        shell: bash
        run: |
          set -euo pipefail

          SCHEMA_FILE="siri-xsd/xsd/siri.xsd"
          EXCLUDE_PREFIX="${{ inputs.exclude_prefix }}"
          FAIL_FAST="${{ inputs.fail_fast }}"

          echo "Using schema file: $SCHEMA_FILE"
          if [ ! -f "$SCHEMA_FILE" ]; then
            echo "ERROR: Schema not found at $SCHEMA_FILE"
            exit 1
          fi

          # Absolute file:// URI and --path for includes/imports
          SCHEMA_ABS="$(realpath "$SCHEMA_FILE")"
          SCHEMA_URI="file://$SCHEMA_ABS"
          SCHEMA_DIR="$(dirname "$SCHEMA_ABS")"
          SCHEMA_PATHS="$SCHEMA_DIR"

          echo "Schema URI: $SCHEMA_URI"
          echo "Schema search paths: $SCHEMA_PATHS"

          # --- Build diff command producing NUL-separated filenames ---
          build_diff_cmd() {
            if [ "${{ inputs.mode }}" = "pr" ]; then
              if [ -z "${{ inputs.base_ref }}" ]; then
                echo "ERROR: base_ref is required for mode=pr" >&2
                return 2
              fi
              git fetch -q origin "${{ inputs.base_ref }}" --depth=1
              MB=$(git merge-base HEAD "origin/${{ inputs.base_ref }}")
              >&2 echo "Merge-base: $MB"
              echo "git diff --name-only -z \"$MB\" HEAD"

            elif [ "${{ inputs.mode }}" = "push" ]; then
              BEFORE="${{ inputs.before }}"
              AFTER="${{ inputs.after }}"
              ZERO40="0000000000000000000000000000000000000000"

              if [ -z "$AFTER" ]; then
                AFTER="$(git rev-parse HEAD)"
              fi

              if [ -z "$BEFORE" ] || [ "$BEFORE" = "$ZERO40" ]; then
                >&2 echo "First push / unknown BEFORE; using merge-base vs origin/main."
                git fetch -q origin main --depth=1
                MB=$(git merge-base "$AFTER" "origin/main" || true)
                if [ -n "$MB" ]; then
                  echo "git diff --name-only -z \"$MB\" \"$AFTER\""
                else
                  # Fall back to files in the commit itself
                  echo "git diff-tree --no-commit-id --name-only -z -r \"$AFTER\""
                fi
              else
                echo "git diff --name-only -z \"$BEFORE\" \"$AFTER\""
              fi
            else
              echo "ERROR: Unknown mode '${{ inputs.mode }}' (expected 'pr' or 'push')" >&2
              return 2
            fi
          }

          # --- Debug: show changed files ---
          echo "Changed files (raw):"
          eval "$(build_diff_cmd)" | tr '\0' '\n' | sed '/^$/d' || true

          STATUS=0
          FOUND_XML=0

          # --- Iterate over NUL-separated output ---
          while IFS= read -r -d '' file; do
            # Only *.xml (case-insensitive)
            shopt -s nocasematch
            if [[ "$file" != *.xml ]]; then
              shopt -u nocasematch
              continue
            fi
            shopt -u nocasematch

            # Exclude XSD folder (the schemas themselves)
            if [[ -n "$EXCLUDE_PREFIX" && "$file" == "$EXCLUDE_PREFIX"* ]]; then
              echo "Skipping excluded: $file"
              continue
            fi

            # Skip deleted files
            if [ ! -f "$file" ]; then
              echo "Skipping (deleted): $file"
              continue
            fi

            FOUND_XML=1
            echo "Validating: $file"

            if ! xmllint --schema "$SCHEMA_URI" --path "$SCHEMA_PATHS" --noout "$file" 2>err.txt; then
              echo "❌ Validation failed: $file"
              MSG=$(sed ':a;N;$!ba;s/\n/%0A/g' err.txt)
              echo "::error file=$file::$MSG"
              STATUS=1
              if [ "$FAIL_FAST" = "true" ]; then
                echo "Fail-fast is enabled — stopping on first failure."
                exit 1
              fi
            else
              echo "✅ OK: $file"
            fi
          done < <(eval "$(build_diff_cmd)")

          if [ "$FOUND_XML" -eq 0 ]; then
            echo "No changed XML files to validate."
          fi

          exit $STATUS
